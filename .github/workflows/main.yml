on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  - name: Build AMD64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_AUDIENCE }}
          tags:
            - tag: ci
      - name: Build
        run: |
          packer build
