name: Build
permissions:
  id-token: write # Request a JWT from Github
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  AMD64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci
      - name: Build
        run: |
          packer init .
          packer build .
